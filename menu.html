<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="menu.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <h2>🔥 Dashboard</h2>
    <span id="user"></span>
</div>

<!-- Sidebar -->
<div class="sidebar">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('profil')">Profil</button>
    <button onclick="showPage('setting')">Setting</button>
    <button onclick="logout()">Logout</button>
</div>

<!-- Konten -->
<div class="content">

    <div id="home" class="page">
        <h2>Home</h2>
        <p>Selamat datang di dashboard 😎</p>
    </div>

    <div id="profil" class="page" style="display:none;">
        <h2>Profil</h2>
        <p id="profilUser"></p>
    </div>

    <div id="setting" class="page" style="display:none;">
        <h2>Setting</h2>
        <p>Pengaturan sederhana ⚙️</p>
    </div>

</div>

<script src="menu.js"></script>
</body>
</html>
